<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spark Estimator" />
  <meta name="theme-color" content="#111827" />
  <title>Spark Repair Estimator</title>
  <!-- Self-contained single-file build: all CSS and JS inlined, runs from a plain
       double-click (file://). The multi-file version + service worker / installable
       PWA is the hosted app. OCR and Excel/ZIP export load their libraries from a CDN
       on demand and require a connection the first time. -->
  <style>
:root{
  --orange:#c4441e; --orange-600:#a83817; --ink:#111827; --ink-2:#1f2937;
  --bg:#f1f5f9; --card:#ffffff; --line:#e5e7eb; --muted:#6b7280; --muted-2:#9ca3af;
  --ok:#16a34a; --danger:#dc2626; --radius:16px; --tap:44px;
  --pad: max(16px, env(safe-area-inset-left));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:var(--bg);overscroll-behavior:none;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink)}
button{font:inherit;cursor:pointer;border:none;background:none}
input{font:inherit}
.safe-bottom{padding-bottom:max(12px,env(safe-area-inset-bottom))}
.pt-safe{padding-top:max(8px,env(safe-area-inset-top))}

/* ============================================================
   COMPONENT LAYER — project screen (mobile-first)
   ============================================================ */
.app{display:flex;flex-direction:column;min-height:100dvh}
.money{font-variant-numeric:tabular-nums}

/* --- Header (dark) --- */
.header{
  background:var(--ink);color:#fff;
  padding:8px var(--pad) 18px;
  padding-left:max(16px,env(safe-area-inset-left));
  padding-right:max(16px,env(safe-area-inset-right));
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  min-height:var(--tap);
}
.brand{
  font-size:.72rem;font-weight:600;letter-spacing:.08em;
  color:var(--muted-2);text-transform:uppercase;
}
.brand b{color:var(--orange);font-weight:800}
.brand-sep{color:var(--muted)}
.header-actions{display:flex;gap:4px}

.icon-btn{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:var(--tap);min-height:var(--tap);
  border-radius:12px;color:var(--ink);
}
.icon-btn:active{background:rgba(0,0,0,.06)}
.icon-btn-dark{color:#e5e7eb}
.icon-btn-dark:active{background:rgba(255,255,255,.12)}

.proj-name-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.proj-name{
  margin:0;font-size:1.15rem;font-weight:600;color:#fff;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.proj-rename{min-width:36px;min-height:36px;border-radius:10px;flex:none}

.total{
  font-size:2.75rem;line-height:1.05;font-weight:800;
  margin-top:8px;letter-spacing:-.02em;
}

.progress-row{margin-top:14px}
.progress{
  height:6px;border-radius:999px;background:rgba(255,255,255,.16);
  overflow:hidden;
}
.progress > i{
  display:block;height:100%;border-radius:999px;
  background:var(--orange);transition:width .4s ease;
}
.progress-label{
  display:block;margin-top:7px;font-size:.78rem;color:var(--muted-2);
  font-variant-numeric:tabular-nums;
}

/* --- Room list (scroll region) --- */
.rooms{
  flex:1 1 auto;background:var(--bg);
  padding:18px var(--pad);
  padding-left:max(16px,env(safe-area-inset-left));
  padding-right:max(16px,env(safe-area-inset-right));
  /* keep last card clear of the fixed action bar */
  padding-bottom:calc(96px + env(safe-area-inset-bottom));
}
.section-title{
  margin:0 0 12px;font-size:.78rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
}
.room-list{display:flex;flex-direction:column;gap:10px}

.room-card{
  display:flex;align-items:center;gap:12px;width:100%;
  min-height:64px;padding:12px 14px;text-align:left;
  background:var(--card);border-radius:var(--radius);
  box-shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.05);
  transition:transform .08s ease,box-shadow .12s ease;
  color:var(--ink);
}
.room-card:active{transform:scale(.985);box-shadow:0 1px 2px rgba(16,24,40,.08)}
.room-main{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1 1 auto}
.room-name{font-size:1rem;font-weight:600;color:var(--ink)}
.room-sub{
  font-size:.8rem;color:var(--muted);
  font-variant-numeric:tabular-nums;
}
.room-right{display:flex;align-items:center;gap:6px;flex:none}
.room-total{font-size:1rem;font-weight:700;color:var(--ink)}
.room-chevron{display:inline-flex;color:var(--muted-2)}

/* --- Bottom action bar (fixed) --- */
.actionbar{
  position:fixed;left:0;right:0;bottom:0;z-index:10;
  display:flex;gap:10px;align-items:stretch;
  padding:10px max(16px,env(safe-area-inset-left));
  padding-bottom:max(10px,env(safe-area-inset-bottom));
  background:var(--card);
  box-shadow:0 -1px 0 var(--line),0 -8px 24px rgba(16,24,40,.06);
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  min-height:var(--tap);padding:0 16px;border-radius:12px;
  font-size:.92rem;font-weight:600;
}
.btn span{white-space:nowrap}
.btn-primary{flex:1 1 auto;background:var(--orange);color:#fff}
.btn-primary:active{background:var(--orange-600)}
.btn-ghost{
  flex:0 0 auto;background:var(--bg);color:var(--ink-2);
  border:1px solid var(--line);
}
.btn-ghost:active{background:var(--line)}

.empty-note{color:var(--muted);font-size:.9rem;text-align:center;padding:24px 0}

/* ============================================================
   COMPONENT LAYER — room detail screen
   ============================================================ */
.room-title{
  margin:0;flex:1 1 auto;text-align:center;
  font-size:1.05rem;font-weight:600;color:#fff;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* Scroll region for groups (mirrors .rooms) */
.groups{
  flex:1 1 auto;background:var(--bg);
  display:flex;flex-direction:column;gap:10px;
  padding:18px var(--pad);
  padding-left:max(16px,env(safe-area-inset-left));
  padding-right:max(16px,env(safe-area-inset-right));
  padding-bottom:calc(32px + env(safe-area-inset-bottom));
}

/* --- Group card --- */
.group{
  background:var(--card);border-radius:var(--radius);
  box-shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.05);
  overflow:hidden;
}
.group-head{
  display:flex;align-items:center;gap:10px;width:100%;
  min-height:var(--tap);padding:12px 14px;text-align:left;
  color:var(--ink);
}
.group-head:active{background:rgba(0,0,0,.03)}
.group-chevron{
  display:inline-flex;flex:none;color:var(--muted-2);
  transition:transform .2s ease;
}
.group-chevron.is-open{transform:rotate(90deg)}
.group-title{flex:1 1 auto;font-size:1rem;font-weight:600;min-width:0}
.group-badge{
  flex:none;font-size:.66rem;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;color:var(--ok);
  background:rgba(22,163,74,.12);padding:3px 8px;border-radius:999px;
}
.group-total{flex:none;font-size:1rem;font-weight:700;color:var(--ink);
  font-variant-numeric:tabular-nums;}
.group-total.is-zero,.line-total.is-zero{color:var(--muted-2);font-weight:600}

.group-body{
  border-top:1px solid var(--line);
  padding:4px 14px 10px;
}

/* --- No Action Needed row --- */
.noaction{
  display:flex;align-items:center;gap:10px;width:100%;
  min-height:var(--tap);padding:8px 0;text-align:left;
  color:var(--muted);font-style:italic;font-size:.9rem;
}
.noaction.is-on{color:var(--ink-2);font-style:normal}

/* --- Item rows --- */
.item-list{display:flex;flex-direction:column}
.item-list.is-deemphasized{opacity:.5}
.item-row{
  display:flex;align-items:flex-start;gap:12px;
  min-height:var(--tap);padding:10px 0;
  border-top:1px solid var(--line);
}
.item-row.is-checked{
  margin:0 -14px;padding:10px 14px;
  background:rgba(196,68,30,.05);
  box-shadow:inset 2px 0 0 var(--orange);
  border-top-color:transparent;
}
.item-main{display:flex;flex-direction:column;gap:4px;flex:1 1 auto;min-width:0}
.item-name{font-size:.95rem;font-weight:600;color:var(--ink)}
.item-sub{font-size:.78rem;color:var(--muted);font-variant-numeric:tabular-nums}
.line-total{
  flex:none;font-size:.95rem;font-weight:700;color:var(--ink);
  font-variant-numeric:tabular-nums;padding-top:2px;
}

/* --- Checkbox (round) --- */
.checkbox{
  display:inline-flex;align-items:center;justify-content:center;flex:none;
  width:26px;height:26px;margin-top:2px;border-radius:999px;
  border:2px solid var(--muted-2);background:var(--card);color:#fff;
  transition:background .12s ease,border-color .12s ease;
}
/* enlarge tap target without enlarging the visual */
.checkbox[data-action]{width:var(--tap);height:var(--tap);margin:-9px 0 0 -9px;
  padding:0;border:none;background:none;position:relative}
.checkbox[data-action]::before{
  content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:26px;height:26px;border-radius:999px;
  border:2px solid var(--muted-2);background:var(--card);
  transition:background .12s ease,border-color .12s ease;
}
.checkbox[data-action] svg{position:relative;z-index:1;color:#fff}
.checkbox[data-action].is-checked::before{background:var(--orange);border-color:var(--orange)}
.checkbox.checkbox-sm{width:22px;height:22px;border-width:2px}
.checkbox.checkbox-sm.is-checked{background:var(--orange);border-color:var(--orange)}

/* --- Quantity input --- */
.qty-row{display:flex;align-items:center;gap:8px;margin-top:2px}
.qty{
  width:96px;min-height:var(--tap);
  padding:8px 12px;text-align:right;
  font-size:1rem;font-variant-numeric:tabular-nums;
  color:var(--ink);background:var(--card);
  border:1px solid var(--line);border-radius:12px;
  -webkit-appearance:none;appearance:none;
}
.qty:focus{outline:none;border-color:var(--orange);
  box-shadow:0 0 0 3px rgba(196,68,30,.18)}
.qty-unit{font-size:.82rem;color:var(--muted)}

/* --- Scan serial placeholder --- */
.scan-serial{
  display:inline-flex;align-items:center;gap:6px;align-self:flex-start;
  min-height:36px;margin-top:2px;padding:0 12px;border-radius:10px;
  font-size:.82rem;font-weight:600;color:var(--ink-2);
  background:var(--bg);border:1px solid var(--line);
}
.scan-serial:active{background:var(--line)}

/* ============================================================
   COMPONENT LAYER — bottom sheet (reusable: add-room, projects, prompt)
   ============================================================ */
.sheet-backdrop{
  position:fixed;inset:0;z-index:1000;
  background:rgba(16,24,40,.45);
  display:flex;flex-direction:column;justify-content:flex-end;
  animation:sheet-fade .18s ease;
}
@keyframes sheet-fade{from{opacity:0}to{opacity:1}}
.sheet{
  background:var(--card);
  border-radius:20px 20px 0 0;
  padding:8px var(--pad) 8px;
  max-height:88dvh;display:flex;flex-direction:column;
  box-shadow:0 -8px 30px rgba(16,24,40,.18);
  animation:sheet-up .22s cubic-bezier(.22,.8,.3,1);
}
@keyframes sheet-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 4px 10px;
}
.sheet-title{margin:0;font-size:1.15rem;font-weight:700;color:var(--ink)}
.sheet-close{min-width:var(--tap);min-height:var(--tap);
  border-radius:12px;color:var(--muted);display:inline-flex;
  align-items:center;justify-content:center}
.sheet-close:active{background:var(--line)}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.sheet-list{display:flex;flex-direction:column;gap:6px}

/* generic tappable row */
.sheet-row{
  display:flex;align-items:center;gap:10px;width:100%;
  min-height:var(--tap);padding:12px 14px;text-align:left;
  background:var(--bg);border:1px solid var(--line);border-radius:14px;
  color:var(--ink);
}
.sheet-row:active{background:var(--line)}
.sheet-row-main{flex:1 1 auto;font-size:1rem;font-weight:600;color:var(--ink)}
.sheet-row-chevron{display:inline-flex;flex:none;color:var(--muted-2)}
.sheet-row.is-disabled{opacity:.55;background:var(--card);cursor:default}
.sheet-tag{
  flex:none;font-size:.72rem;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;color:var(--muted);
  background:var(--line);padding:3px 9px;border-radius:999px;
}

/* projects rows */
.sheet-row-proj{padding:8px 8px 8px 14px}
.sheet-row-proj.is-active{border-color:var(--orange);
  box-shadow:inset 0 0 0 1px var(--orange)}
.proj-pick{
  display:flex;flex-direction:column;align-items:flex-start;gap:2px;
  flex:1 1 auto;background:none;border:none;padding:8px 0;min-height:var(--tap);
}
.proj-pick-name{display:flex;align-items:center;gap:8px;
  font-size:1rem;font-weight:600;color:var(--ink)}
.proj-pick-date{font-size:.78rem;color:var(--muted)}
.sheet-badge{
  font-size:.66rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:#fff;background:var(--orange);padding:2px 8px;border-radius:999px;
}
.proj-act{flex:none;min-width:var(--tap);min-height:var(--tap);
  border-radius:12px;color:var(--muted);
  display:inline-flex;align-items:center;justify-content:center}
.proj-act:active{background:var(--line)}
.sheet-cta{margin-top:14px;width:100%}

/* prompt sheet */
.sheet-input{
  width:100%;min-height:48px;padding:12px 14px;margin:6px 0 4px;
  font-size:1.05rem;color:var(--ink);
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  -webkit-appearance:none;appearance:none;
}
.sheet-input:focus{outline:none;border-color:var(--orange);
  box-shadow:0 0 0 3px rgba(196,68,30,.18)}
.sheet-actions{display:flex;gap:10px;margin-top:14px}
.sheet-btn{flex:1 1 0;justify-content:center}

/* --- Per-line price + delete controls --- */
.line-actions{flex:none;display:flex;align-items:center;gap:6px;padding-top:2px}
.line-del{
  flex:none;min-width:var(--tap);min-height:var(--tap);
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:12px;color:var(--muted-2);background:none;border:none;
}
.line-del:active{background:var(--line);color:var(--danger)}
.price-row{display:flex;align-items:center;gap:8px;margin-top:2px;flex-wrap:wrap}
.price-label{font-size:.78rem;font-weight:600;color:var(--muted)}
.price-input{
  width:96px;min-height:var(--tap);
  padding:8px 12px;text-align:right;
  font-size:1rem;font-variant-numeric:tabular-nums;
  color:var(--ink);background:var(--card);
  border:1px solid var(--line);border-radius:12px;
  -webkit-appearance:none;appearance:none;
}
.price-input:focus{outline:none;border-color:var(--orange);
  box-shadow:0 0 0 3px rgba(196,68,30,.18)}
.price-custom-tag{
  font-size:.66rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--orange);background:rgba(196,68,30,.10);
  padding:2px 8px;border-radius:999px;
}
.price-dot{
  display:inline-block;width:6px;height:6px;margin-left:6px;
  border-radius:999px;background:var(--orange);vertical-align:middle;
}

/* --- Settings & pricing sheet --- */
.settings-section{padding:6px 0 14px;border-bottom:1px solid var(--line)}
.settings-section:last-child{border-bottom:none;padding-bottom:4px}
.settings-h{margin:8px 0 4px;font-size:1rem;font-weight:700;color:var(--ink)}
.settings-help{margin:0 0 12px;font-size:.84rem;line-height:1.4;color:var(--muted)}
.settings-help code{
  font-size:.8rem;background:var(--line);padding:1px 5px;border-radius:6px;color:var(--ink-2);
}
.settings-file{width:100%;justify-content:center;cursor:pointer}
.settings-status{
  margin:10px 0 0;font-size:.82rem;font-weight:600;color:var(--muted);
}
.settings-status.is-active{color:var(--orange)}
.settings-reset{width:100%;margin-top:10px;justify-content:center;color:var(--danger)}
.ci-form{display:flex;flex-direction:column;gap:10px}
.ci-field{
  width:100%;min-height:var(--tap);padding:11px 14px;
  font-size:1rem;color:var(--ink);
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  -webkit-appearance:none;appearance:none;
}
.ci-field:focus{outline:none;border-color:var(--orange);
  box-shadow:0 0 0 3px rgba(196,68,30,.18)}
.ci-save{width:100%;justify-content:center;margin-top:2px}

/* ============================================================
   Photos — room-level + serial-item-level strips (Task 9)
   Fixed thumb dimensions so async hydration causes no layout shift.
   ============================================================ */
.room-photos{margin:0 0 14px}
.room-photos-label{
  margin:0 0 8px;font-size:.72rem;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--muted);
}
.photo-strip{
  display:flex;align-items:center;gap:10px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:2px 2px 6px;scrollbar-width:none;
}
.photo-strip::-webkit-scrollbar{display:none}
.thumb-wrap{position:relative;flex:0 0 auto}
.thumb{
  display:block;width:78px;height:78px;object-fit:cover;
  border-radius:12px;border:1px solid var(--line);
  background:var(--line);   /* neutral placeholder while src is hydrated */
}
.thumb-remove{
  position:absolute;top:-6px;right:-6px;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.05rem;line-height:1;font-weight:700;
  color:#fff;background:var(--danger);
  border:2px solid var(--card);cursor:pointer;padding:0;
  -webkit-appearance:none;appearance:none;
}
.thumb-add{
  flex:0 0 auto;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  width:78px;height:78px;min-width:78px;min-height:78px;
  border-radius:12px;border:2px dashed var(--orange);
  background:transparent;color:var(--orange);
  font-size:.7rem;font-weight:700;cursor:pointer;padding:6px;
  -webkit-appearance:none;appearance:none;
}
.thumb-add:active{background:rgba(196,68,30,.08)}
/* Serial-item strip sits tighter under the qty/scan controls. */
.item-main .photo-strip{margin-top:8px}

/* ============================================================
   Serial OCR — captured chips on the row + scan result sheet (Task 10)
   ============================================================ */
.serial-captured{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.serial-chip{
  display:inline-flex;align-items:center;
  padding:3px 9px;font-size:.72rem;font-weight:700;
  letter-spacing:.02em;color:var(--orange-600);
  background:rgba(196,68,30,.08);border:1px solid rgba(196,68,30,.2);
  border-radius:999px;font-variant-numeric:tabular-nums;
}

.ocr-sub{margin:0 0 14px;font-size:.9rem;font-weight:600;color:var(--muted)}
.ocr-label{
  display:block;margin:12px 0 6px;font-size:.72rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
}
.ocr-field{
  width:100%;min-height:var(--tap);padding:11px 14px;
  font-size:1rem;color:var(--ink);
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  -webkit-appearance:none;appearance:none;
}
.ocr-field:focus{outline:none;border-color:var(--orange);
  box-shadow:0 0 0 3px rgba(196,68,30,.18)}

.ocr-raw{margin-top:14px}
.ocr-raw summary{
  font-size:.78rem;font-weight:700;color:var(--muted);cursor:pointer;
  padding:6px 0;list-style:revert;
}
.ocr-raw-text{
  margin:6px 0 0;max-height:140px;overflow:auto;-webkit-overflow-scrolling:touch;
  padding:10px 12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:.72rem;line-height:1.4;white-space:pre-wrap;word-break:break-word;
  color:var(--ink-2);background:var(--bg);border:1px solid var(--line);border-radius:10px;
}

.ocr-loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:36px 0 30px;
}
.ocr-spinner{
  width:34px;height:34px;border-radius:50%;
  border:3px solid var(--line);border-top-color:var(--orange);
  animation:ocr-spin .8s linear infinite;
}
.ocr-loading-msg{margin:0;font-size:.92rem;font-weight:600;color:var(--muted)}
@keyframes ocr-spin{to{transform:rotate(360deg)}}

/* ============================================================
   Deal / margin analyzer sheet
   ============================================================ */
.deal-form{display:flex;flex-direction:column;gap:4px}
.deal-field-label{font-size:.82rem;font-weight:600;color:var(--muted);margin-top:8px}
.deal-input-wrap{position:relative;display:flex;align-items:center;margin:2px 0 6px}
.deal-prefix{
  position:absolute;left:14px;font-size:1.05rem;font-weight:600;
  color:var(--muted);pointer-events:none;
}
.deal-input{

      document.body.appendChild(input);
      input.addEventListener("change", async () => {
        try {
          const files = Array.from(input.files || []);
          if (files.length) {
            const proj = activeProject();
            const arr = proj.photoRefs[key] ||= [];
            for (const file of files) {
              const blob = await compress(file);
              const id = uid("ph");
              await putPhoto(id, blob);
              arr.push({ id, name: file.name || id + ".jpg" });
            }
            persist();
            rerenderPreservingScroll();
          }
        } catch (err) {
          console.warn("add photo failed", err);
          alert("Could not add photo.");
        } finally {
          input.remove();
        }
      }, { once: true });
      input.click();
      return;
    }
    if (a === "remove-photo") {
      const { key, id } = el.dataset;
      const proj = activeProject();
      const arr = proj.photoRefs[key] || [];
      proj.photoRefs[key] = arr.filter((ph) => ph.id !== id);
      delPhoto(id).catch((e2) => console.warn("del photo failed", e2));
      persist();
      rerenderPreservingScroll();
      return;
    }
    if (a === "scan-serial") {
      const { room, item } = el.dataset;
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.capture = "environment";
      input.style.cssText = "position:fixed;top:-1000px;left:-1000px;opacity:0";
      document.body.appendChild(input);
      input.addEventListener("change", async () => {
        try {
          const file = (input.files || [])[0];
          if (!file) return;
          const proj = activeProject();
          const key = room + ":" + item;
          const blob = await compress(file);
          const id = uid("ph");
          await putPhoto(id, blob);
          (proj.photoRefs[key] ||= []).push({ id, name: file.name || id + ".jpg" });
          persist();
          ui.sheet = { type: "ocr", room, item, serial: "", year: "", text: "", loading: true };
          render();
          try {
            const res = await readSerial(blob);
            ui.sheet = { type: "ocr", room, item, serial: res.serial, year: res.year, text: res.text, loading: false };
            render();
          } catch (ocrErr) {
            ui.sheet = null;
            render();
            alert("Serial scanning needs an internet connection the first time. Your photo was saved \u2014 try Scan again once online.");
          }
        } catch (err) {
          console.warn("scan-serial failed", err);
          alert("Could not capture photo.");
        } finally {
          input.remove();
        }
      }, { once: true });
      input.click();
      return;
    }
    if (a === "ocr-save") {
      if (ui.sheet?.type === "ocr") {
        const { room, item } = ui.sheet;
        const serial = document.getElementById("ocr-serial")?.value.trim() || "";
        const year = document.getElementById("ocr-year")?.value.trim() || "";
        const proj = activeProject();
        const sel = proj.selections[room] ||= {};
        const cur = sel[item] ||= { checked: false, qty: "" };
        cur.year = year;
        cur.serial = serial;
        persist();
      }
      ui.sheet = null;
      render();
      return;
    }
    if (a === "deal") {
      ui.sheet = { type: "deal" };
      render();
      return;
    }
    if (a === "export") {
      el.disabled = true;
      exportProject(p, overridesFor(p)).catch((err) => {
        console.warn("export failed", err);
        alert("Could not export. Please try again.");
      }).finally(() => {
        el.disabled = false;
      });
      return;
    }
  });
  function savePrompt() {
    if (ui.sheet?.type !== "prompt") return;
    const val = document.getElementById("sheet-input")?.value.trim();
    if (!val) {
      ui.sheet = null;
      render();
      return;
    }
    if (ui.sheet.mode === "new") {
      newProject(val);
      view = { name: "project" };
      expandedGroups.clear();
    } else {
      renameProject(ui.sheet.id, val);
    }
    ui.sheet = null;
    render();
  }
  app.addEventListener("keydown", (e) => {
    if (ui.sheet?.type !== "prompt") return;
    if (e.target?.id !== "sheet-input") return;
    if (e.key === "Enter") {
      e.preventDefault();
      savePrompt();
    } else if (e.key === "Escape") {
      e.preventDefault();
      ui.sheet = null;
      render();
    }
  });
  app.addEventListener("input", (e) => {
    const dealEl = e.target.closest('[data-action="deal-input"]');
    if (dealEl) {
      const p2 = activeProject();
      p2.deal[dealEl.dataset.field] = dealEl.value;
      persist();
      const host = document.getElementById("deal-result");
      if (host) host.outerHTML = renderDealResult(p2, overridesFor(p2));
      return;
    }
    const el = e.target.closest('[data-action="qty"], [data-action="price"]');
    if (!el) return;
    const a = el.dataset.action;
    const { room, item } = el.dataset;
    const p = activeProject();
    if (a === "qty") {
      const sel = p.selections[room] ||= {};
      (sel[item] ||= { checked: true, qty: "" }).qty = el.value;
      persist();
    } else {
      setProjectPrice(p, item, el.value);
    }
    updateAfterChange(p, currentRoom(p), item, overridesFor(p));
  });
  app.addEventListener("change", (e) => {
    const input = e.target.closest("#price-csv-input");
    if (!input) return;
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const rows = parseCSV(String(reader.result || ""));
        const n = applyPriceCSV(rows);
        alert(n + " prices updated");
      } catch (err) {
        console.warn("price CSV import failed", err);
        alert("Could not read that CSV.");
      }
      ui.sheet = null;
      render();
    };
    reader.readAsText(file);
  });
  window.addEventListener("pagehide", persistNow);
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) persistNow();
  });
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch((e) => console.warn("SW registration failed", e));
    });
  }
})();

  </script>
</body>
</html>
